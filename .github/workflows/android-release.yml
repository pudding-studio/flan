name: Android Release to Play Console (Closed Testing)

on:
  push:
    branches:
      - main

jobs:
  build_and_upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.10'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p key
          echo "$KEYSTORE_BASE64" | base64 --decode > key/upload-keystore.jks
          echo "Decoded keystore SHA-256:"
          sha256sum key/upload-keystore.jks
          echo "Keystore fingerprint:"
          keytool -list -v -keystore key/upload-keystore.jks -storepass "${{ secrets.ANDROID_STORE_PASSWORD }}" 2>&1 | grep -E "(Alias|SHA1|SHA256):" || true

      - name: Create key.properties
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=${{ github.workspace }}/key/upload-keystore.jks
          EOF

      - name: Build AAB (release, obfuscated)
        run: |
          flutter build appbundle \
            --release \
            --split-debug-info=build/debug-info \
            --obfuscate

      - name: Upload debug symbols artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-info
          path: build/debug-info
          retention-days: 90

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload to Play Console (Closed Testing — alpha)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.flanapp.flan
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: alpha
          status: completed
